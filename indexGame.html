<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aula Javascript</title>
<style>
    .tabuleiro {
      display: grid;
      grid-template-columns: repeat(3,150px);
      gap: 10px;      
    }

    .celula {
        display: flex;
        background-color: bisque;
        width: 150px;
        height: 150px;
        justify-content: center;
        align-items: center;
        font-size: 46px;
        cursor: pointer;
    }

    #botaoReiniciar {
        margin-top: 20px;
        padding: 15px;
    }

</style>
</head>
<body>
    <h1>Jogo da Velha</h1>
    <div id="tabuleiro-jogo" class="tabuleiro">
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
        <button class="celula"></button>
    </div>
        <button id="botaoReiniciar">Reiniciar o jogo</button>

    <script src="scriptGame.js"></script>
</body>
</html>
